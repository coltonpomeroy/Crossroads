name: Deploy Theme to DreamHost

on:
  push:
    branches: [main, staging]
    paths:
      - 'wp-content/themes/crossroads-commons/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set deploy target
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "remote_path=${{ secrets.DREAMHOST_THEME_PATH }}" >> "$GITHUB_OUTPUT"
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "remote_path=${{ secrets.DREAMHOST_STAGING_THEME_PATH }}" >> "$GITHUB_OUTPUT"
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy via SFTP (${{ steps.target.outputs.environment }})
        env:
          SSHPASS: ${{ secrets.DREAMHOST_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o PubkeyAuthentication=no -o PreferredAuthentications=password" \
            ./wp-content/themes/crossroads-commons/ \
            ${{ secrets.DREAMHOST_USERNAME }}@${{ secrets.DREAMHOST_SERVER }}:${{ steps.target.outputs.remote_path }}
