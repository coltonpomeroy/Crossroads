name: Deploy Theme to DreamHost

on:
  push:
    branches: [main, staging]
    paths:
      - 'wp-content/themes/crossroads-commons/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set deploy target
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "remote_path=${{ secrets.DREAMHOST_THEME_PATH }}" >> "$GITHUB_OUTPUT"
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "remote_path=${{ secrets.DREAMHOST_STAGING_THEME_PATH }}" >> "$GITHUB_OUTPUT"
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SFTP (${{ steps.target.outputs.environment }})
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.DREAMHOST_SERVER }}
          username: ${{ secrets.DREAMHOST_USERNAME }}
          ssh_private_key: ${{ secrets.DREAMHOST_SSH_KEY }}
          local_path: ./wp-content/themes/crossroads-commons/.
          remote_path: ${{ steps.target.outputs.remote_path }}
          sftp_only: true
