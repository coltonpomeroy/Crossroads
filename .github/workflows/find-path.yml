name: Find Remote Path

on:
  workflow_dispatch:

jobs:
  find-path:
    runs-on: ubuntu-latest
    steps:
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Explore remote filesystem
        run: |
          lftp -u "${{ secrets.DREAMHOST_USERNAME }},${{ secrets.DREAMHOST_PASSWORD }}" \
            -e "set sftp:auto-confirm yes; \
                set sftp:connect-program 'ssh -o StrictHostKeyChecking=no -o PubkeyAuthentication=no -o PreferredAuthentications=password'; \
                pwd; \
                ls; \
                cls -R --maxdepth=3; \
                quit" \
            sftp://${{ secrets.DREAMHOST_SERVER }}
